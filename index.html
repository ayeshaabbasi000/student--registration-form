<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration - Ayesha Abbasi</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        width: 350px;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    form {
        display: flex;
        flex-direction: column;
    }

    label {
        margin-top: 10px;
        margin-bottom: 5px;
        font-weight: bold;
    }

    input, select {
        padding: 10px; /* ✅ Padding */
        border-radius: 5px;
        border: 1px solid #ccc;
        margin-bottom: 10px; /* ✅ Margin */
        transition: 0.3s;
    }

    input:focus, select:focus {
        border-color: #007bff;
        outline: none;
    }

    .gender, .hobbies {
        display: flex; /* ✅ Flexbox */
        gap: 10px;
        margin-bottom: 10px;
    }

    button {
        padding: 10px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #0056b3; /* ✅ Hover effect */
    }
</style>
</head>

<body>

<div class="container">
    <h2>Student Registration</h2>

    <form>
        <label>Name</label>
        <input type="text" value="Ayesha Abbasi">

        <label>Email</label>
        <input type="email" value="ayeshaabbasi364@gmail.com">

        <label>Password</label>
        <input type="password" value="667677">

        <label>City</label>
        <select>
            <option>Islamabad</option>
            <option>Lahore</option>
            <option>Karachi</option>
        </select>

        <label>Gender</label>
        <div class="gender">
            <label><input type="radio" name="gender"> Female</label>
            <label><input type="radio" name="gender"> Male</label>
        </div>

        <label>Hobbies</label>
        <div class="hobbies">
            <label><input type="checkbox"> Traveling</label>
            <label><input type="checkbox"> Reading</label>
        </div>

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
